name: Support Auto-close

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: support-autoclose
  cancel-in-progress: true

jobs:
  autoclose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call support autoclose endpoint
        env:
          APP_URL_SECRET: ${{ secrets.APP_URL }}
        run: |
          set -euo pipefail

          APP_URL="${APP_URL_SECRET:-https://www.propatyhub.com}"
          CRON_SECRET="${{ secrets.CRON_SECRET }}"
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing required secret: CRON_SECRET"
            exit 1
          fi

          AUTOCLOSE_URL="${APP_URL%/}/api/internal/support/autoclose"
          echo "Auto-close URL: ${AUTOCLOSE_URL}"

          DEBUG_DIR="${GITHUB_WORKSPACE}/.cron-debug/support-autoclose"
          mkdir -p "${DEBUG_DIR}"
          RESPONSE_BODY="${DEBUG_DIR}/response-body.json"
          RESPONSE_HEADERS="${DEBUG_DIR}/response-headers.txt"
          CURL_VERBOSE="${DEBUG_DIR}/curl-verbose.log"

          ATTEMPTS=2
          SLEEP_SECONDS=8
          attempt=1
          success=0
          http_code=""
          curl_exit=0

          while [ "${attempt}" -le "${ATTEMPTS}" ]; do
            : > "${RESPONSE_BODY}"
            : > "${RESPONSE_HEADERS}"
            : > "${CURL_VERBOSE}"

            echo "Attempt ${attempt}/${ATTEMPTS}"
            set +e
            http_code="$(curl -sS \
              -o "${RESPONSE_BODY}" \
              -D "${RESPONSE_HEADERS}" \
              -w "%{http_code}" \
              -X POST "${AUTOCLOSE_URL}" \
              -H "x-cron-secret: ${CRON_SECRET}" \
              -H "content-type: application/json" \
              --data '{}' \
              -v 2>"${CURL_VERBOSE}")"
            curl_exit=$?
            set -e

            echo "HTTP status: ${http_code:-curl_error}"
            echo "Response JSON:"
            cat "${RESPONSE_BODY}" || true
            echo ""

            response_ok=0
            set +e
            node -e '
              const fs = require("fs");
              const responsePath = process.argv[1];
              const raw = fs.readFileSync(responsePath, "utf8");
              let payload;
              try {
                payload = JSON.parse(raw);
              } catch (error) {
                console.error("Response body is not valid JSON.");
                process.exit(1);
              }
              if (!payload || payload.ok !== true) {
                console.error("Support autoclose endpoint returned ok != true.");
                process.exit(1);
              }
              const closedResolved = Number(payload.closedResolved ?? 0);
              const closedNew = Number(payload.closedNew ?? 0);
              const totalClosed = Number(payload.totalClosed ?? closedResolved + closedNew);
              console.log(`Run summary: closedResolved=${closedResolved} closedNew=${closedNew} totalClosed=${totalClosed}`);
            ' "${RESPONSE_BODY}"
            response_ok=$?
            set -e

            if [ "${curl_exit}" -eq 0 ] && [[ "${http_code}" =~ ^2[0-9][0-9]$ ]] && [ "${response_ok}" -eq 0 ]; then
              success=1
              break
            fi

            retry_allowed=0
            if [ "${curl_exit}" -ne 0 ]; then
              retry_allowed=1
            elif [[ "${http_code}" =~ ^5[0-9][0-9]$ ]]; then
              retry_allowed=1
            elif [ "${response_ok}" -ne 0 ]; then
              retry_allowed=1
            fi

            if [ "${attempt}" -lt "${ATTEMPTS}" ] && [ "${retry_allowed}" -eq 1 ]; then
              echo "Network/5xx failure detected, retrying once in ${SLEEP_SECONDS}s..."
              sleep "${SLEEP_SECONDS}"
            else
              break
            fi

            attempt=$((attempt + 1))
          done

          if [ "${success}" -ne 1 ]; then
            echo "Support auto-close call failed."
            echo "Final HTTP status: ${http_code:-curl_error}, curl exit: ${curl_exit}"
            exit 1
          fi

      - name: Upload autoclose failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: support-autoclose-failure-artifacts
          path: |
            .cron-debug/support-autoclose/response-body.json
            .cron-debug/support-autoclose/response-headers.txt
            .cron-debug/support-autoclose/curl-verbose.log
          if-no-files-found: warn
          retention-days: 7
