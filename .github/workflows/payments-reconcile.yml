name: Payments Reconcile

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: payments-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.9.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate required secrets
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${APP_URL:-}" ]; then
            echo "::error title=Missing workflow secret::APP_URL is required for the payments reconcile workflow."
            exit 1
          fi

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error title=Missing workflow secret::CRON_SECRET is required for the payments reconcile workflow."
            exit 1
          fi

          {
            echo "### payments-reconcile"
            echo ""
            echo "- APP_URL: configured"
            echo "- CRON_SECRET: configured"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Install web deps
        run: npm --prefix web ci

      - name: Run server auth guard
        run: npm --prefix web run guard:no-server-getsession

      - name: Run next image optimisation guard
        run: npm --prefix web run guard:next-image-optimisation

      - name: Run shortlets perf budgets guard
        run: npm --prefix web run guard:shortlets-perf

      - name: Call payments reconcile batch endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEBUG_ROOT: ${{ github.workspace }}/.cron-debug/payments-reconcile
          ATTEMPTS: "3"
          SLEEP_SECONDS: "10"
        run: |
          bash .github/scripts/call-cron-endpoint.sh "payments-batch" "/api/jobs/payments/reconcile"

      - name: Call shortlet payments reconcile endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEBUG_ROOT: ${{ github.workspace }}/.cron-debug/payments-reconcile
          ATTEMPTS: "3"
          SLEEP_SECONDS: "10"
        run: |
          bash .github/scripts/call-cron-endpoint.sh "shortlet-reconcile" "/api/internal/shortlet/reconcile-payments"

      - name: Upload payments reconcile failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: payments-reconcile-failure-artifacts
          path: .cron-debug/payments-reconcile
          if-no-files-found: warn
          retention-days: 7
